spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:expense_tracker}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  jackson:
    time-zone: UTC
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    secret: ${SECRET_KEY}
    expiry-days: 30
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173}
  upload:
    dir: ${UPLOAD_DIR:/app/data/uploads}
  allow-registration: ${ALLOW_REGISTRATION:true}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    price-solo: ${STRIPE_PRICE_SOLO:}
    price-pro: ${STRIPE_PRICE_PRO:}
    price-business: ${STRIPE_PRICE_BUSINESS:}
    price-overage: ${STRIPE_PRICE_OVERAGE:}
  ai:
    groq-api-key: ${GROQ_API_KEY:}
    openrouter-api-key: ${OPENROUTER_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    max-retries: 2
    anthropic-ocr-model: ${ANTHROPIC_OCR_MODEL:claude-haiku-4-5-20251001}
    groq-ocr-model: ${GROQ_OCR_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
    openrouter-ocr-model: ${OPENROUTER_OCR_MODEL:google/gemini-2.5-flash-preview-05-20}
    anthropic-chat-model: ${ANTHROPIC_CHAT_MODEL:claude-haiku-4-5-20251001}
    groq-chat-model: ${GROQ_CHAT_MODEL:llama-3.3-70b-versatile}
    ocr-provider: ${OCR_PROVIDER:auto}

logging:
  level:
    com.expensetracker: INFO
    org.springframework.security: WARN
